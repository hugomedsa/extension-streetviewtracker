<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street View Tracker</title>
<link rel="stylesheet" href="leaflet.css" crossorigin=""/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
    background: #0d0d0d;
    color: #e0e0e0;
  }

  #map {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    cursor: move;
  }

  /* Dot pulsante no canto inferior esquerdo */
  #live-dot {
    position: absolute;
    bottom: 8px;
    left: 8px;
    z-index: 1004;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 0 0 rgba(34,197,94,.4);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
    70%  { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
  }
  #live-dot.inactive {
    background: #444;
    box-shadow: none;
    animation: none;
  }
</style>
</head>
<body>

<div id="map"></div>
<div id="live-dot" class="inactive" title="Waiting for coordinates…"></div>

<script src="leaflet.js"></script>
<script src="map.js"></script>
</body>
</html>
