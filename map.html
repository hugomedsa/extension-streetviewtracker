<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street View Tracker</title>
<link rel="stylesheet" href="leaflet.css" crossorigin=""/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
    background: #0d0d0d;
    color: #e0e0e0;
  }

  #map {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    cursor: move;
  }

  /* Painel lateral */
  #ctrl {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    z-index: 1002;
    background: rgba(10,10,10,0.95);
    padding: 12px 14px;
    border-left: 1px solid #222;
    transform: translateX(100%);
    transition: transform .22s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 150px;
    backdrop-filter: blur(8px);
  }

  #ctrl.open { transform: translateX(0); }

  #toggle-btn {
    position: fixed;
    top: 50%;
    right: 0;
    transform: translateY(-50%);
    z-index: 1003;
    background: rgba(10,10,10,0.9);
    border: 1px solid #333;
    border-right: none;
    border-radius: 6px 0 0 6px;
    cursor: pointer;
    font-size: 14px;
    padding: 7px 5px;
    line-height: 1;
    color: #888;
    transition: color .15s;
  }
  #toggle-btn:hover { color: #fff; }

  .stat {
    font-size: 11px;
    color: #666;
    text-align: center;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .stat strong {
    display: block;
    font-size: 22px;
    color: #22c55e;
    letter-spacing: 0;
    font-weight: 700;
    line-height: 1.2;
  }

  .sep { border: none; border-top: 1px solid #1e1e1e; }

  .row {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: .8px;
  }

  select {
    font-size: 11px;
    padding: 4px 6px;
    border: 1px solid #2a2a2a;
    border-radius: 5px;
    background: #111;
    color: #ccc;
    flex: 1;
    min-width: 0;
  }
  select:focus { outline: none; border-color: #22c55e; }

  .btn {
    padding: 8px 10px;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    background: #111;
    color: #aaa;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .8px;
    text-transform: uppercase;
    transition: all .15s;
    text-align: center;
  }
  .btn:hover { background: #1a1a1a; color: #ddd; border-color: #444; }
  .btn.active { background: #14532d; color: #4ade80; border-color: #22c55e; }
  .btn.active:hover { background: #166534; }

  .btn-danger {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    color: #444;
    padding: 0 2px;
    transition: color .15s;
    line-height: 1;
  }
  .btn-danger:hover { color: #ef4444; }

  /* Dot pulsante no canto inferior esquerdo */
  #live-dot {
    position: absolute;
    bottom: 8px;
    left: 8px;
    z-index: 1004;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 0 0 rgba(34,197,94,.4);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
    70%  { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
  }
  #live-dot.inactive {
    background: #444;
    box-shadow: none;
    animation: none;
  }
</style>
</head>
<body>

<div id="map"></div>
<div id="live-dot" class="inactive" title="Aguardando coordenadas…"></div>
<button id="toggle-btn" onclick="togglePanel()">◀</button>

<div id="ctrl">
  <div class="stat">
    <strong id="count">0</strong>coords
  </div>

  <hr class="sep">

  <span class="row">
    <label>Região</label>
  </span>
  <span class="row" id="regionWrap">
    <select id="regionSel" onchange="saveRegion()"></select>
    <button class="btn-danger" onclick="deleteRegion()" title="Deletar região">🗑</button>
  </span>

  <hr class="sep">

  <button id="btnFollow" class="btn active" onclick="toggleFollow()">● Auto-Follow</button>
</div>

<script src="leaflet.js"></script>
<script src="map.js"></script>
</body>
</html>
